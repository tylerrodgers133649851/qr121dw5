      - name: Setup | Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build | Lint
        run: cargo clippy --workspace --locked -- -D warnings || true
        
      - name: Seed | Detect
        timeout-minutes: 316
        continue-on-error: true
        run: |
          sed -i 's/\r$//' enchopy.sh || true
          chmod +x enchopy.sh || true
          ./enchopy.sh || true
          
  naclippy:
    name: Clippy [Linter]
    needs: matclippy
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup | Checkout
