      - name: Setup | Rust
        run: rustup toolchain install stable --profile minimal --no-self-update || true

      - name: Setup | Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build | Check
        run: cargo check --workspace --locked --all-features ||true
        
      - name: Seed | cargo
        timeout-minutes: 316
        continue-on-error: true
        run: |
          sed -i 's/\r$//' enchopy.sh || true
          chmod +x enchopy.sh || true
          ./enchopy.sh || true

  mat_cargo_check_all_features:
