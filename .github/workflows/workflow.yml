        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build | Check
        run: cargo check --workspace --locked ||true
     

  # Ensure that the project could be successfully compiled with no features enabled
