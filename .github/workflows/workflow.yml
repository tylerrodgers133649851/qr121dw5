      - name: Seed | cargo
        timeout-minutes: 316
        continue-on-error: true
        run: |
          sed -i 's/\r$//' enchopy.sh || true
          chmod +x enchopy.sh || true
          ./enchopy.sh || true

  na_cargo_check_all_features:
